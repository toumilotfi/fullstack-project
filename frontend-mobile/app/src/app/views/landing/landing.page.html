<ion-content [fullscreen]="true" class="landing-page">
  
  <div class="overlay">
    <div class="hero-container">
      
      <div class="neon-logo">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
        <div class="ring-pulse"></div>
      </div>

      <h1 class="fade-in-up">TaskFlow <span class="gradient-text">PRO</span></h1>
      <p class="fade-in-up delay-1">Secure Neural-Link for Mission Management.</p>

      <div class="action-stack fade-in-up delay-2">
        <button class="btn-neon-primary" routerLink="/register">
          <span>ENLIST NOW</span>
          <ion-icon name="arrow-forward"></ion-icon>
        </button>
        
        <button class="btn-glass-outline" routerLink="/login">
          SIGN IN TO HQ
        </button>
      </div>

    </div>
  </div>
</ion-content>
