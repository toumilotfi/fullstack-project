<ion-content class="app-page-bg">

  <app-glass-header title="MISSION ARCHIVE" subtitle="HISTORY LOGS">
    <ion-back-button defaultHref="/home" color="light"></ion-back-button>
  </app-glass-header>

  <div class="archive-container">

    <!-- TASK LIST -->
    <div class="task-list">

      <ng-container 
        *ngFor="let task of taskCtrl.userTasks(); trackBy: trackByTaskId">

        <div class="modern-card">

          <!-- HEADER -->
          <div class="card-header">
            <span class="task-id">#{{ task.id }}</span>

            <ion-chip [color]="getStatusColor(task.status || 'ASSIGNED')">
              {{ task.status || 'ASSIGNED' }}
            </ion-chip>
          </div>

          <!-- CONTENT -->
          <h3>{{ task.title }}</h3>
          <p>{{ task.description }}</p>

          <!-- 🔥 RESPONSE BOX -->
          <div *ngIf="(task.status || 'ASSIGNED') === 'ASSIGNED'" class="response-box">

            <div class="input-wrapper glass-input">
              <ion-textarea
                placeholder="Write your response..."
                [(ngModel)]="task.tempResponse"
                name="response-{{task.id}}"
                autoGrow="true"
                class="mission-textarea">
              </ion-textarea>
            </div>

            <button
              class="btn-execute neon-btn"
              [disabled]="!task.tempResponse?.trim()"
              (click)="respond(task)">
              <ion-icon name="paper-plane-outline"></ion-icon>
              SEND RESPONSE
            </button>

          </div>

          <!-- 🔁 REVISION MODE -->
          <div *ngIf="task.status === 'REVISION_REQUESTED'" class="response-box">

            <div class="input-wrapper glass-input">
              <ion-textarea
                placeholder="Update your response..."
                [(ngModel)]="task.tempResponse"
                name="revision-{{task.id}}"
                autoGrow="true"
                class="mission-textarea">
              </ion-textarea>
            </div>

            <button
              class="btn-execute neon-btn"
              [disabled]="!task.tempResponse?.trim()"
              (click)="respond(task)">
              <ion-icon name="refresh-circle-outline"></ion-icon>
              RESUBMIT
            </button>

          </div>

          <!-- 📊 PROGRESS -->
          <div class="progress-container">
            <div class="progress-text">
              <span>Status</span>
              <span>{{ task.status || 'ASSIGNED' }}</span>
            </div>

            <ion-progress-bar
              [value]="getProgress(task.status || 'ASSIGNED')"
              [color]="getStatusColor(task.status || 'ASSIGNED')">
            </ion-progress-bar>
          </div>

        </div>

      </ng-container>
    </div>

    <!-- EMPTY STATE -->
    <div 
      *ngIf="taskCtrl.userTasks().length === 0"
      class="empty-state">

      <ion-icon name="file-tray-outline"></ion-icon>
      <p>No mission records found in the database.</p>

    </div>

  </div>
</ion-content>
