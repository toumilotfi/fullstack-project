<ion-content class="app-page-bg">
  
  <app-glass-header title="MISSION ARCHIVE" subtitle="HISTORY LOGS">
    <ion-back-button defaultHref="/home" color="light"></ion-back-button>
  </app-glass-header>

  <div class="archive-container">
    <div class="task-list">
      <ng-container *ngFor="let task of taskCtrl.userTasks()">
        
        <div class="modern-card">
          <div class="card-header">
            <span class="task-id">REF-{{ task.id }}</span>
            <ion-chip [color]="task.completed ? 'success' : 'warning'">
              {{ task.completed ? 'TERMINATED' : 'ACTIVE' }}
            </ion-chip>
          </div>

          <h3>{{ task.title }}</h3>
          <p>{{ task.description }}</p>

          <div class="progress-container">
            <div class="progress-text">
              <span>Neural Sync</span>
              <span>{{ task.completed ? '100%' : '0%' }}</span>
            </div>
            <ion-progress-bar [value]="task.completed ? 1 : 0" [color]="task.completed ? 'success' : 'primary'"></ion-progress-bar>
          </div>
        </div>

      </ng-container>
    </div>

    <div *ngIf="taskCtrl.userTasks().length === 0" class="empty-state">
      <ion-icon name="file-tray-outline"></ion-icon>
      <p>No mission records found in the database.</p>
    </div>
  </div>
</ion-content>
