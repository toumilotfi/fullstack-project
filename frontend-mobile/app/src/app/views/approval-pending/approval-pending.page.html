<ion-content class="auth-bg">
  <div class="neon-mesh-container">
    
    <div class="glass-card status-card">
      <div class="status-icon-container">
        <div class="pulse-ring"></div>
        <ion-icon name="shield-half-outline"></ion-icon>
      </div>

      <div class="header-section">
        <h1>STATUS: <span class="neon-text">PENDING</span></h1>
        <p>Credentials received, Agent.</p>
      </div>

      <div class="info-box">
        <p>Lotfi (The Admin) must manually authorize your neural link before you can access active missions.</p>
        <p class="email-display" *ngIf="registeredEmail">{{ registeredEmail }}</p>
      </div>

      <button class="action-btn-neon" (click)="checkStatus()">
        CHECK AUTHORIZATION
      </button>

      <button class="action-btn-outline" routerLink="/login">
        <span>BACK TO GATEWAY</span>
      </button>

      <div class="footer-note">
        <ion-icon name="alert-circle-outline"></ion-icon>
        Awaiting response from Spring Boot Server.
      </div>
    </div>

  </div>
</ion-content>
