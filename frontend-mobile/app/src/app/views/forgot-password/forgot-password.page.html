<ion-content class="auth-page">
  <div class="glass-card">
    
    <div class="logo-section">
      <div class="icon-box warning">
        <ion-icon name="key-outline"></ion-icon>
      </div>
      <h2>RECOVER ACCESS</h2>
      <p>Enter your neural-link email to receive a temporary decryption key.</p>
    </div>

    <div class="input-group">
      <div class="glass-input">
        <ion-icon name="mail-outline"></ion-icon>
        <input type="email" placeholder="Agent Email Address" [(ngModel)]="email">
      </div>
    </div>

    <button class="btn-primary" (click)="sendResetLink()">
      TRANSMIT RESET REQUEST <ion-icon name="paper-plane-outline"></ion-icon>
    </button>

    <div class="footer-link">
      <span routerLink="/login">BACK TO GATEWAY</span>
    </div>

  </div>
</ion-content>
