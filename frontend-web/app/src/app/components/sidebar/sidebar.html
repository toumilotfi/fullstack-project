<div class="sidebar-wrapper">
  <div class="logo">
    <h2>TaskFlow <span>Admin</span></h2>
  </div>

  <nav class="nav-links">

      <ion-icon name="grid-outline"></ion-icon> <span>Dashboard</span>

    <a class="nav-item" routerLink="/admin/approvals" routerLinkActive="active">
      <ion-icon name="shield-checkmark-outline"></ion-icon> <span>Approvals</span>
