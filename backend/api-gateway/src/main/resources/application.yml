server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://localhost:8100"
              - "capacitor://localhost"
              - "http://localhost"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-login
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        - id: user-logout
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/User/logout

        - id: admin-users
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/admin/users,/api/v1/admin/users/**,/api/v1/admin/test-email

        - id: task-service
          uri: lb://task-service
          predicates:
            - Path=/api/v1/Task/**

        - id: user-messages
          uri: lb://messaging-service
          predicates:
            - Path=/api/v1/User/message/**,/api/v1/User/messages/**

        - id: admin-messages
          uri: lb://messaging-service
          predicates:
            - Path=/api/v1/admin/message/**,/api/v1/admin/messages,/api/v1/admin/messages/**

        - id: websocket
          uri: lb:ws://messaging-service
          predicates:
            - Path=/chat/**

        - id: notification-api
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/Not/**

        - id: user-notifications
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/User/not/**,/api/v1/User/read/**

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-32-characters-long}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
