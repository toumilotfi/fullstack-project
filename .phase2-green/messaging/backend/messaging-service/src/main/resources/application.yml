server:
  port: 8083

spring:
  application:
    name: messaging-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${MESSAGING_DB_PORT:5435}/messaging_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

gateway:
  internal-secret: ${GATEWAY_INTERNAL_SECRET:}

websocket:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201,http://localhost:4202,http://localhost:8100,capacitor://localhost,http://localhost}
